# Skills Graph — Raja GHV
# Format: skill_id → label, synonyms, domain, level descriptors, implies edges, role membership
# implies weights: 1.0 = same skill, 0.8 = strong transfer, 0.6 = moderate, 0.4 = weak

skills:

  # ── HARDWARE / CHIP DESIGN ──────────────────────────────────────────────────

  rtl_design:
    label: RTL Design
    synonyms: [Verilog, VHDL, SystemVerilog, RTL, HVL, hardware description language,
               digital design, logic design, register transfer level]
    domain: hardware
    level_descriptors:
      EXPERT: Full SoC RTL ownership, tapeout experience, complex clock/reset/interface design
      PROFICIENT: Block-level RTL for real products, code review authority
      FAMILIAR: RTL for coursework, FPGAs, or small blocks
    implies:
      digital_logic: 0.90
      timing_analysis: 0.75
      hardware_verification: 0.65
      fpga_design: 0.55
      soc_architecture: 0.50
      synthesis: 0.70
    required_by: [silicon_engineer, asic_designer, soc_architect, eda_engineer]

  vlsi_physical_design:
    label: VLSI Physical Design
    synonyms: [physical design, PD, place and route, PnR, floorplanning, VLSI,
               layout, backend design, full custom layout]
    domain: hardware
    level_descriptors:
      EXPERT: Full chip PD closure, multi-voltage, advanced node (7nm/5nm)
      PROFICIENT: Block-level PD, familiar with full flow
      FAMILIAR: Academic or assisted PD work
    implies:
      timing_analysis: 0.80
      synthesis: 0.60
      rtl_design: 0.40
      power_analysis: 0.75
    required_by: [silicon_engineer, physical_design_engineer]

  dft:
    label: DFT / Design for Test
    synonyms: [DFT, ATPG, scan insertion, BIST, boundary scan, JTAG, test compression,
               design for testability, fault coverage]
    domain: hardware
    implies:
      rtl_design: 0.50
      hardware_verification: 0.55
    required_by: [silicon_engineer, dft_engineer]

  soc_architecture:
