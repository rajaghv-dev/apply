      embedded_firmware: 0.60
      timing_analysis: 0.70
      interconnect_design: 0.75
      power_analysis: 0.65
    required_by: [soc_architect, silicon_engineer, hardware_architect]

  timing_analysis:
    label: Timing Analysis / STA
